<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280">
  <title>회의실예약 — Hey:log</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/main.css">
  <link rel="stylesheet" href="/static/style.css">
  <!-- FOUC 방지: 외부 모듈 평가 전에 저장된 테마를 즉시 적용 -->
  <script>
    (function () {
      var t = localStorage.getItem('angeldash.theme') || 'dark';
      document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
    })();
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <nav>
      <a href="/"><i data-lucide="calendar-days"></i> 일일업무보고</a>
      <a href="/weekly-report.html"><i data-lucide="bar-chart-3"></i> 주간업무보고</a>
      <a href="/projects.html"><i data-lucide="folder"></i> 프로젝트</a>
      <a href="/rooms.html" class="active"><i data-lucide="calendar"></i> 회의실예약</a>
      <a href="/vacation.html"><i data-lucide="tent"></i> 휴가조회</a>
      <a href="/logs.html"><i data-lucide="clipboard-list"></i> 로그</a>
      <a href="/settings.html"><i data-lucide="settings"></i> 설정</a>
    </nav>
    <div class="header-right">
      <span id="user-name" class="muted">로딩...</span>
      <button id="btn-refresh" title="새로고침"><i data-lucide="refresh-cw"></i></button>
    </div>
  </header>

  <section class="controls">
    <div class="view-toggle">
      <button class="view-btn" data-view="day">일</button>
      <button class="view-btn" data-view="week2">2주</button>
    </div>

    <button id="date-prev" title="이전">◀</button>
    <input type="date" id="date-input">
    <button id="date-next" title="다음">▶</button>

    <label>층:
      <select id="floor-select">
        <option value="8" selected>8층</option>
        <option value="10">10층</option>
        <option value="12">12층</option>
      </select>
    </label>
  </section>

  <section class="room-filter" id="room-filter">
    <span class="rf-label">회의실:</span>
    <div class="room-chips" id="room-chips"></div>
  </section>

  <main class="grid-wrap">
    <table id="schedule-grid" aria-label="회의실 시간표"></table>
    <div id="week-container" hidden></div>
  </main>

  <section class="my-reservations">
    <h2><i data-lucide="clipboard-list"></i> 내 예약 (90일)</h2>
    <ul id="my-list"></ul>
  </section>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="/static/app.js" defer></script>
  <!-- 통합 nav / 테마 토글 / 이모지 → SVG 일괄 교체 -->
  <script type="module">
    import { initHeader } from '/static/js/header.js';
    initHeader();
  </script>
</body>
</html>
