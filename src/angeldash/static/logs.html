<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>로그 — AngelDash</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <nav>
      <a href="/"><i data-lucide="calendar-days"></i> 일일업무보고</a>
      <a href="/weekly-report.html"><i data-lucide="bar-chart-3"></i> 주간업무보고</a>
      <a href="/projects.html"><i data-lucide="folder"></i> 프로젝트</a>
      <a href="/rooms.html"><i data-lucide="calendar"></i> 회의실예약</a>
      <a href="/vacation.html"><i data-lucide="tent"></i> 휴가조회</a>
      <a href="/logs.html" class="active"><i data-lucide="clipboard-list"></i> 로그</a>
      <a href="/settings.html"><i data-lucide="settings"></i> 설정</a>
    </nav>
    <div class="header-right">
      <span id="user-name" class="muted">로딩...</span>
      <button id="btn-refresh" title="새로고침"><i data-lucide="refresh-cw"></i></button>
    </div>
  </header>
  <main>
    <section>
      <h2>최근 동작 로그 (90일)</h2>
      <table id="logs-table" class="resizable-table sortable-table">
        <colgroup>
          <col style="width: 170px">
          <col style="width: 160px">
          <col style="width: 130px">
          <col style="width: 60px">
          <col>
        </colgroup>
        <thead>
          <tr>
            <th data-sort-key="ts">시각<span class="sort-indicator"></span></th>
            <th data-sort-key="kind">종류<span class="sort-indicator"></span></th>
            <th data-sort-key="target">대상<span class="sort-indicator"></span></th>
            <th data-sort-key="status">상태<span class="sort-indicator"></span></th>
            <th data-sort-key="message">메시지<span class="sort-indicator"></span></th>
          </tr>
        </thead>
        <tbody id="logs-tbody"></tbody>
      </table>
    </section>
  </main>
  <script type="module" src="/static/js/logs.js"></script>
</body>
</html>
