<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>일일업무보고 — AngelDash</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
  <header>
    <nav>
      <a href="/" class="active">📅 일일업무보고</a>
      <a href="/projects.html">🗂 프로젝트</a>
      <a href="/rooms.html">🗓 회의실예약</a>
      <a href="/vacation.html">🏖 휴가조회</a>
      <a href="/logs.html">📋 로그</a>
      <a href="/settings.html">⚙️ 설정</a>
    </nav>
    <span id="user-label" class="muted"></span>
  </header>
  <main>
    <details id="ongoing-schedule" open>
      <summary>
        <span>📌 진행중인 일정</span>
        <button id="btn-copy-schedule" title="전체 텍스트를 클립보드로 복사">📋 복사</button>
      </summary>
      <textarea id="ongoing-schedule-text"
                placeholder="월간/주간 계획, 차주 예정 등 자유 형식. 일일/주간 보고에 복사해 쓰세요."></textarea>
    </details>

    <section class="week-header">
      <button id="prev-week">◀ 이전 주</button>
      <span id="week-label">로딩…</span>
      <button id="this-week">이번 주</button>
      <button id="next-week">다음 주 ▶</button>
      <span class="spacer"></span>
      <button id="btn-excel" title="이 주가 속한 달의 회사 시스템 Excel 다운로드">📥 다운로드</button>
    </section>

    <section id="days"></section>

    <section class="week-notes">
      <h3>📝 이번 주 메모 (UpNote 동기화에만 포함)</h3>
      <textarea id="week-note" placeholder="자유 메모…"></textarea>
    </section>

    <section class="actions-bar">
      <span>타임시트 대상:</span>
      <select id="target">
        <option value="week">이번 주 전체</option>
        <option value="today">오늘만</option>
      </select>
      <button class="primary" id="btn-report" title="오늘 날짜만 복사">📋 팀장 보고 복사 (오늘)</button>
      <button class="primary" id="btn-timesheet">📤 타임시트 입력</button>
      <button id="btn-verify" title="회사 시스템 시간과 비교">🔍 타임시트 확인</button>
      <button class="primary" id="btn-upnote" title="이번 주 전체 노트 생성">🔄 UpNote 저장 (주)</button>
    </section>
  </main>
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
